<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>생일 파티에 초대합니다!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Gowun Dodum', sans-serif;
            background-color: #fdf2f8; 
            -webkit-font-smoothing: antialiased;
        }
        
        .fade-in-up {
            animation: fadeInUp 1s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
        .delay-300 { animation-delay: 0.3s; }
        .delay-400 { animation-delay: 0.4s; }
        .delay-500 { animation-delay: 0.5s; }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .bounce-slight {
            animation: bounceSlight 2s infinite ease-in-out;
        }

        @keyframes bounceSlight {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .animate-jump {
            animation: jump 0.5s ease-in-out;
        }

        @keyframes jump {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.05); }
        }

        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: rgba(55, 65, 81, 0.9);
            color: #fff;
            text-align: center;
            border-radius: 9999px;
            padding: 12px;
            position: fixed;
            z-index: 50;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s, bottom 0.3s, visibility 0.3s;
        }

        #toast.show {
            visibility: visible;
            opacity: 1;
            bottom: 50px;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <!-- 메인 컨테이너 -->
    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden fade-in-up relative">
        <!-- 상단 장식 바 -->
        <div class="h-3 w-full bg-gradient-to-r from-pink-300 via-purple-300 to-blue-300"></div>

        <div class="p-8 flex flex-col items-center">
            
            <!-- 아바타 및 말풍선 영역 -->
            <div class="relative w-full flex flex-col items-center mb-6 fade-in-up delay-100">
                <div class="bg-pink-100 text-pink-800 px-5 py-3 rounded-2xl shadow-sm text-sm font-bold mb-4 relative bounce-slight">
                    "내일 제 생일 파티에 초대해요!"
                    <div class="absolute w-3 h-3 bg-pink-100 rotate-45 -bottom-1 left-1/2 transform -translate-x-1/2"></div>
                </div>
                
                <!-- 도겸이 프로필 사진 (상대 경로 적용) -->
                <div class="w-32 h-32 bg-pink-50 rounded-full flex items-center justify-center shadow-inner overflow-hidden border-4 border-white shadow-md">
                    <img src="./image_f7e79b.jpg" alt="도겸이 사진" class="w-full h-full object-cover">
                </div>
            </div>

            <!-- 메인 타이틀 -->
            <div class="text-center mb-8 fade-in-up delay-200">
                <h1 class="text-2xl font-extrabold text-gray-800 mb-2">3월 2일(월), 12:00 (봄날🌸)<br><span class="text-pink-500">도겸이의 생일 파티🥳</span></h1>
                <p class="text-gray-500 text-sm">소중한 분들과 함께하고 싶습니다.</p>
            </div>

            <!-- 상세 정보 카드 -->
            <div class="w-full bg-gray-50 rounded-2xl p-5 mb-6 shadow-sm fade-in-up delay-300">
                <!-- 일시 -->
                <div class="flex items-start mb-4">
                    <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center shadow-sm text-pink-400 mr-4 flex-shrink-0">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    </div>
                    <div>
                        <p class="text-xs text-gray-400 font-semibold mb-1">일시</p>
                        <p class="text-gray-800 font-bold">2026. 03. 02. (월)</p>
                        <p class="text-pink-500 font-bold">낮 12:00</p>
                    </div>
                </div>

                <div class="w-full h-px bg-gray-200 mb-4"></div>

                <!-- 장소 -->
                <div class="flex items-start">
                    <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center shadow-sm text-blue-400 mr-4 flex-shrink-0">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    </div>
                    <div>
                        <p class="text-xs text-gray-400 font-semibold mb-1">장소</p>
                        <p class="text-gray-800 font-bold">비스트로 봄날 도청점</p>
                        <p class="text-gray-500 text-sm mt-1 leading-snug">경북 안동시 풍천면<br>호수공원2길 12</p>
                    </div>
                </div>
            </div>

            <!-- 스페셜 초대 (직접 제작 영상 적용) -->
            <div class="w-full mb-6 fade-in-up delay-500">
                <h2 class="text-lg font-bold text-gray-800 mb-3 text-center">스페셜 초대 영상</h2>
                
                <div class="relative rounded-2xl overflow-hidden shadow-md bg-black border-2 border-transparent">
                    <!-- 영상 플레이어 (상대 경로 적용) -->
                    <!-- poster 속성에 기존 이미지를 넣어 영상 로딩 전 썸네일로 활용합니다. -->
                    <video id="special-video" controls playsinline preload="metadata" poster="./image_f7ea61.png" class="w-full h-auto max-h-64 object-contain">
                        <!-- src 경로에 제작하신 영상 파일명(my_video.mp4)을 일치시켜야 합니다. -->
                        <source src="./my_video.mp4" type="video/mp4">
                        사용 중인 브라우저가 비디오 재생을 지원하지 않습니다.
                    </video>
                </div>
            </div>

            <!-- 액션 버튼 -->
            <div class="w-full flex gap-3 fade-in-up delay-400">
                <button onclick="copyAddress()" class="flex-1 bg-white border border-pink-200 text-pink-500 font-bold py-3 px-4 rounded-xl shadow-sm hover:bg-pink-50 transition duration-300 flex justify-center items-center text-sm">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                    주소 복사
                </button>
                <a href="https://map.kakao.com/link/search/경북 안동시 풍천면 호수공원2길 12" target="_blank" class="flex-1 bg-gradient-to-r from-pink-400 to-pink-500 text-white font-bold py-3 px-4 rounded-xl shadow-md hover:from-pink-500 hover:to-pink-600 transition duration-300 flex justify-center items-center text-sm">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>
                    지도 보기
                </a>
            </div>

        </div>
    </div>

    <!-- 토스트 메시지 -->
    <div id="toast">주소가 클립보드에 복사되었습니다.</div>

    <script>
        function copyAddress() {
            const address = "경북 안동시 풍천면 호수공원2길 12";
            const tempInput = document.createElement("input");
            tempInput.value = address;
            document.body.appendChild(tempInput);
            tempInput.select();
            tempInput.setSelectionRange(0, 99999);
            
            try {
                document.execCommand("copy");
                showToast();
            } catch (err) {
                console.error('복사 실패', err);
            }
            document.body.removeChild(tempInput);
        }

        function showToast() {
            const toast = document.getElementById("toast");
            toast.className = "show";
            setTimeout(function(){ 
                toast.className = toast.className.replace("show", ""); 
            }, 3000);
        }

        function playMinionGreeting(element) {
            const img = document.getElementById('minion-img');
            img.classList.remove('animate-jump');
            void img.offsetWidth; // trigger reflow
            img.classList.add('animate-jump');
        }

        // 반복적으로 터지는 폭죽 애니메이션 효과
        window.onload = function() {
            var defaults = { startVelocity: 25, spread: 360, ticks: 100, zIndex: 0 };

            function randomInRange(min, max) { 
                return Math.random() * (max - min) + min; 
            }

            setInterval(function() {
                var particleCount = 40;
                
                confetti(Object.assign({}, defaults, { 
                    particleCount,
                    origin: { x: randomInRange(0.1, 0.3), y: randomInRange(0.3, 0.5) },
                    colors: ['#F472B6', '#60A5FA', '#FCD34D', '#A78BFA']
                }));
                
                setTimeout(function() {
                    confetti(Object.assign({}, defaults, { 
                        particleCount,
                        origin: { x: randomInRange(0.7, 0.9), y: randomInRange(0.3, 0.5) },
                        colors: ['#F472B6', '#60A5FA', '#FCD34D', '#A78BFA']
                    }));
                }, 500);
                
            }, 2000); 
        };
    </script>
</body>

</html>
